name: Deploy para Produção

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/saas-atendimento
            echo "📦 Puxando código..."
            git pull origin main
            echo "🔨 Rebuild da API..."
            sudo docker compose -f docker-compose.prod.yml up -d --build api
            echo "🗄️ Rodando migrations..."
            sudo docker compose -f docker-compose.prod.yml run --rm api node dist/db/migrate.js
            echo "🎨 Rebuild do frontend..."
            sudo docker compose -f docker-compose.prod.yml up -d --build web
            echo "🔄 Reload do nginx..."
            sudo docker compose -f docker-compose.prod.yml up -d --force-recreate nginx
            echo "✅ Deploy concluído!"
            sudo docker compose -f docker-compose.prod.yml ps
